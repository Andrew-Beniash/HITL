name: Deploy — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # never cancel in-flight deploys

env:
  REGISTRY: ghcr.io
  IMAGE_ORG: hitl
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: "10.20.0"

jobs:
  # ── Build & push all images ──────────────────────────────────────────────────
  build-and-push:
    name: Build & push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: document-storage
            dockerfile: infra/docker/document-storage.Dockerfile
          - service: epub-conversion
            dockerfile: infra/docker/epub-conversion.Dockerfile
          - service: annotation-session
            dockerfile: infra/docker/annotation-session.Dockerfile
          - service: collaboration
            dockerfile: infra/docker/collaboration.Dockerfile
          - service: ai-orchestration
            dockerfile: infra/docker/ai-orchestration.Dockerfile
          - service: audit-trail
            dockerfile: infra/docker/audit-trail.Dockerfile
          - service: notification
            dockerfile: infra/docker/notification.Dockerfile
          - service: platform-config
            dockerfile: infra/docker/platform-config.Dockerfile
          - service: web
            dockerfile: infra/docker/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Deploy to staging cluster ────────────────────────────────────────────────
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.hitl.example.com
    permissions:
      contents: read
      id-token: write  # for OIDC cluster auth
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Update image tags to SHA
        env:
          SHA_TAG: sha-${{ github.sha }}
        run: |
          cd infra/k8s/overlays/staging
          # Rewrite the staging image tags to the exact SHA built above
          kustomize edit set image \
            ghcr.io/hitl/web:staging=ghcr.io/${{ env.IMAGE_ORG }}/web:${SHA_TAG} \
            ghcr.io/hitl/document-storage:staging=ghcr.io/${{ env.IMAGE_ORG }}/document-storage:${SHA_TAG} \
            ghcr.io/hitl/epub-conversion:staging=ghcr.io/${{ env.IMAGE_ORG }}/epub-conversion:${SHA_TAG} \
            ghcr.io/hitl/annotation-session:staging=ghcr.io/${{ env.IMAGE_ORG }}/annotation-session:${SHA_TAG} \
            ghcr.io/hitl/collaboration:staging=ghcr.io/${{ env.IMAGE_ORG }}/collaboration:${SHA_TAG} \
            ghcr.io/hitl/ai-orchestration:staging=ghcr.io/${{ env.IMAGE_ORG }}/ai-orchestration:${SHA_TAG} \
            ghcr.io/hitl/audit-trail:staging=ghcr.io/${{ env.IMAGE_ORG }}/audit-trail:${SHA_TAG} \
            ghcr.io/hitl/notification:staging=ghcr.io/${{ env.IMAGE_ORG }}/notification:${SHA_TAG} \
            ghcr.io/hitl/platform-config:staging=ghcr.io/${{ env.IMAGE_ORG }}/platform-config:${SHA_TAG}

      - name: Apply manifests
        run: kubectl apply -k infra/k8s/overlays/staging/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/staging-document-storage -n hitl-staging --timeout=300s
          kubectl rollout status deployment/staging-epub-conversion   -n hitl-staging --timeout=300s
          kubectl rollout status deployment/staging-web               -n hitl-staging --timeout=300s

      - name: Smoke test
        run: |
          STAGING_URL="https://staging.hitl.example.com"
          curl -sf "${STAGING_URL}/health" || (echo "Staging health check failed"; exit 1)
