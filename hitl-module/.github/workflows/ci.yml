name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: "10.20.0"

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm -r --if-present exec tsc --noEmit

  # ── Unit tests ───────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: "**/coverage/"
          retention-days: 7

  # ── Python service tests ─────────────────────────────────────────────────────
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [epub-conversion, ai-orchestration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install poetry
        run: pip install poetry==1.8.5

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: poetry install --no-interaction --no-ansi

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: poetry run pytest -v

  # ── Docker builds (syntax check) ─────────────────────────────────────────────
  docker-build:
    name: Docker build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: document-storage
            dockerfile: infra/docker/document-storage.Dockerfile
          - service: epub-conversion
            dockerfile: infra/docker/epub-conversion.Dockerfile
          - service: annotation-session
            dockerfile: infra/docker/annotation-session.Dockerfile
          - service: collaboration
            dockerfile: infra/docker/collaboration.Dockerfile
          - service: ai-orchestration
            dockerfile: infra/docker/ai-orchestration.Dockerfile
          - service: audit-trail
            dockerfile: infra/docker/audit-trail.Dockerfile
          - service: notification
            dockerfile: infra/docker/notification.Dockerfile
          - service: platform-config
            dockerfile: infra/docker/platform-config.Dockerfile
          - service: web
            dockerfile: infra/docker/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Kustomize dry-run ────────────────────────────────────────────────────────
  kustomize-dry-run:
    name: Kustomize dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Dry-run staging overlay
        run: |
          kubectl apply --dry-run=client -k infra/k8s/overlays/staging/ 2>&1 | \
            grep -v "^Warning:" || true

      - name: Dry-run production overlay
        run: |
          kubectl apply --dry-run=client -k infra/k8s/overlays/production/ 2>&1 | \
            grep -v "^Warning:" || true
