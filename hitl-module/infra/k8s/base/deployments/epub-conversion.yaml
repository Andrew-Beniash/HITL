apiVersion: apps/v1
kind: Deployment
metadata:
  name: epub-conversion
  labels:
    app.kubernetes.io/name: epub-conversion
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: epub-conversion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: epub-conversion
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: epub-conversion
          image: ghcr.io/hitl/epub-conversion:latest
          ports:
            - containerPort: 3002
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: redis-url
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: s3-bucket
            - name: AUDIT_SERVICE_URL
              value: http://audit-trail:3006
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
