apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestration
  labels:
    app.kubernetes.io/name: ai-orchestration
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-orchestration
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-orchestration
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ai-orchestration
          image: ghcr.io/hitl/ai-orchestration:latest
          ports:
            - containerPort: 3005
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PORT
              value: "3005"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: redis-url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: anthropic-api-key
            - name: AUDIT_SERVICE_URL
              value: http://audit-trail:3006
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
