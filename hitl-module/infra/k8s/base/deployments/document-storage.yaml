apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-storage
  labels:
    app.kubernetes.io/name: document-storage
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: document-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: document-storage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: document-storage
          image: ghcr.io/hitl/document-storage:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: redis-url
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: s3-bucket
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
