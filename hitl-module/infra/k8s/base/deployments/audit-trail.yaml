apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-trail
  labels:
    app.kubernetes.io/name: audit-trail
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: audit-trail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit-trail
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: audit-trail
          image: ghcr.io/hitl/audit-trail:latest
          ports:
            - containerPort: 3006
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3006"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hitl-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 10
