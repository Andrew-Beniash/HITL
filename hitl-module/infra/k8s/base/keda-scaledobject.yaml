apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: epub-conversion-scaler
  labels:
    app.kubernetes.io/name: epub-conversion
spec:
  scaleTargetRef:
    name: epub-conversion
  minReplicaCount: 2
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: redis
      metadata:
        # BullMQ wait-list key (§9 — scale when queue depth >= 5 jobs per replica)
        listName: "bull:epub-conversion:wait"
        listLength: "5"
        address: redis-master.hitl.svc.cluster.local:6379
        passwordFromEnv: REDIS_PASSWORD
