services:
  postgres:
    image: postgres:16
    container_name: hitl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hitl
      POSTGRES_PASSWORD: hitl
      POSTGRES_DB: hitl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hitl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: hitl-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mc:
    image: minio/mc
    container_name: hitl-minio-init
    restart: "no"
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing local/hitl-documents
        echo "Bucket hitl-documents ready."

volumes:
  postgres_data:
  redis_data:
  minio_data:
